<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="stylesheet" href="css/app.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand"><div class="brand-icon"><svg width="22" height="22" viewBox="0 0 28 28" fill="none"><rect x="2" y="2" width="10" height="10" rx="2" fill="currentColor"/><rect x="16" y="2" width="10" height="10" rx="2" fill="currentColor" opacity="0.5"/><rect x="2" y="16" width="10" height="10" rx="2" fill="currentColor" opacity="0.5"/><rect x="16" y="16" width="10" height="10" rx="2" fill="currentColor"/></svg></div><span>AttendTrack</span></div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>Overview</a>
    <a href="classes.html" class="nav-item"><svg viewBox="0 0 20 20" fill="none"><path d="M10 2L2 6l8 4 8-4-8-4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M2 10l8 4 8-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 14l8 4 8-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Classes</a>
    <a href="students.html" class="nav-item"><svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="6" r="3.5" stroke="currentColor" stroke-width="1.5"/><path d="M3 17c0-3.314 3.134-6 7-6s7 2.686 7 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>Students</a>
    <a href="attendance.html" class="nav-item active"><svg viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="13" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M7 2v4M13 2v4M3 9h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M7 13l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Take Attendance</a>
    <a href="reports.html" class="nav-item"><svg viewBox="0 0 20 20" fill="none"><path d="M4 3h12a1 1 0 011 1v12a1 1 0 01-1 1H4a1 1 0 01-1-1V4a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5"/><path d="M7 7h6M7 10h6M7 13h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>Reports</a>
  </nav>
  <div class="sidebar-footer"><div class="user-chip" id="user-chip"><div class="avatar" id="nav-avatar">J</div><div class="user-info"><span class="user-name" id="nav-name">Loading…</span><span class="user-role" id="nav-org">—</span></div></div><button class="logout-btn" id="logout-btn" title="Sign out"><svg viewBox="0 0 20 20" fill="none"><path d="M13 10H3m0 0l3-3m-3 3l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 5V4a1 1 0 011-1h6a1 1 0 011 1v12a1 1 0 01-1 1h-6a1 1 0 01-1-1v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button></div>
</aside>
<header class="topbar"><button class="menu-toggle" id="menu-toggle"><svg viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button><span class="topbar-title">Take Attendance</span></header>

<main class="main-content">
  <div class="page-header">
    <div><h1>Take Attendance</h1><p class="sub">Select a class and mark each student</p></div>
  </div>

  <!-- Step 1: Select class & date -->
  <div class="card" id="setup-card">
    <div class="card-header"><h2>Session Setup</h2></div>
    <div class="card-body">
      <div class="form-row-2">
        <div class="field-group">
          <label>Class *</label>
          <select id="att-class"><option value="">— Choose a class —</option></select>
        </div>
        <div class="field-group">
          <label>Date *</label>
          <input type="date" id="att-date"/>
        </div>
      </div>
      <div class="field-group" style="margin-top:.75rem">
        <label>Notes (optional)</label>
        <input type="text" id="att-notes" placeholder="e.g. Unit test day"/>
      </div>
      <div style="margin-top:1.25rem">
        <button class="btn-accent" id="start-btn">Load Students</button>
      </div>
    </div>
  </div>

  <!-- Step 2: Mark attendance -->
  <div id="marking-section" style="display:none">
    <div class="card" style="margin-top:1.25rem">
      <div class="card-header">
        <h2 id="att-session-title">Marking Attendance</h2>
        <div style="display:flex;gap:8px;align-items:center">
          <span class="badge badge-green" id="att-present-count">0 Present</span>
          <span class="badge badge-red" id="att-absent-count">0 Absent</span>
          <span class="badge badge-amber" id="att-late-count">0 Late</span>
        </div>
      </div>
      <div style="padding:.75rem 1.4rem;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn-ghost" id="mark-all-present">✓ Mark All Present</button>
        <button class="btn-ghost" id="mark-all-absent">✗ Mark All Absent</button>
      </div>
      <div id="att-grid" class="att-grid"></div>
    </div>
    <div style="margin-top:1.25rem;display:flex;gap:.75rem;justify-content:flex-end">
      <button class="btn-ghost" id="cancel-btn">Cancel</button>
      <button class="btn-accent" id="save-att-btn">
        <svg viewBox="0 0 20 20" fill="none" width="15" height="15"><path d="M4 10l5 5 7-8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Save Session
      </button>
    </div>
  </div>
</main>

<div class="sidebar-overlay" id="sidebar-overlay"></div>
<script src="js/app.js">
  
</script>
<script src="js/attendance.js"></script>
</body>
</html>
