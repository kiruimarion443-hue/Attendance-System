<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reports — AttendTrack</title>
  <link rel="stylesheet" href="css/app.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand"><div class="brand-icon"><svg width="22" height="22" viewBox="0 0 28 28" fill="none"><rect x="2" y="2" width="10" height="10" rx="2" fill="currentColor"/><rect x="16" y="2" width="10" height="10" rx="2" fill="currentColor" opacity="0.5"/><rect x="2" y="16" width="10" height="10" rx="2" fill="currentColor" opacity="0.5"/><rect x="16" y="16" width="10" height="10" rx="2" fill="currentColor"/></svg></div><span>AttendTrack</span></div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>Overview</a>
    <a href="classes.html" class="nav-item"><svg viewBox="0 0 20 20" fill="none"><path d="M10 2L2 6l8 4 8-4-8-4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M2 10l8 4 8-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 14l8 4 8-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Classes</a>
    <a href="students.html" class="nav-item"><svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="6" r="3.5" stroke="currentColor" stroke-width="1.5"/><path d="M3 17c0-3.314 3.134-6 7-6s7 2.686 7 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>Students</a>
    <a href="attendance.html" class="nav-item"><svg viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="13" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M7 2v4M13 2v4M3 9h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M7 13l2 2 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Take Attendance</a>
    <a href="reports.html" class="nav-item active"><svg viewBox="0 0 20 20" fill="none"><path d="M4 3h12a1 1 0 011 1v12a1 1 0 01-1 1H4a1 1 0 01-1-1V4a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5"/><path d="M7 7h6M7 10h6M7 13h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>Reports</a>
  </nav>
  <div class="sidebar-footer"><div class="user-chip" id="user-chip"><div class="avatar" id="nav-avatar">J</div><div class="user-info"><span class="user-name" id="nav-name">Loading…</span><span class="user-role" id="nav-org">—</span></div></div><button class="logout-btn" id="logout-btn" title="Sign out"><svg viewBox="0 0 20 20" fill="none"><path d="M13 10H3m0 0l3-3m-3 3l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 5V4a1 1 0 011-1h6a1 1 0 011 1v12a1 1 0 01-1 1h-6a1 1 0 01-1-1v-1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button></div>
</aside>
<header class="topbar"><button class="menu-toggle" id="menu-toggle"><svg viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button><span class="topbar-title">Reports</span></header>

<main class="main-content">
  <div class="page-header">
    <div><h1>Reports</h1><p class="sub">Review attendance history and student summaries</p></div>
  </div>

  <!-- Tabs -->
  <div style="display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;width:fit-content;margin-bottom:1.5rem">
    <button class="tab-btn active" id="tab-sessions" onclick="switchTab('sessions')">Session History</button>
    <button class="tab-btn" id="tab-students" onclick="switchTab('students')">Student Summary</button>
  </div>

  <!-- Session History -->
  <div id="sessions-view">
    <div class="filter-bar">
      <select class="filter-select" id="sess-class-filter"><option value="">All Classes</option></select>
      <input type="date" class="filter-select" id="sess-date-from" title="From date"/>
      <input type="date" class="filter-select" id="sess-date-to" title="To date"/>
    </div>
    <div class="card">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Date</th><th>Class</th><th>Present</th><th>Absent</th><th>Late</th><th>Rate</th><th>Actions</th></tr></thead>
          <tbody id="sessions-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Student Summary -->
  <div id="students-view" style="display:none">
    <div class="filter-bar">
      <div class="search-wrap"><svg viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M16 16l-3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg><input type="text" id="stu-search" placeholder="Search students…"/></div>
      <select class="filter-select" id="stu-class-filter"><option value="">All Classes</option></select>
    </div>
    <div class="card">
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Student</th><th>Class</th><th>Sessions</th><th>Present</th><th>Absent</th><th>Late</th><th>Rate</th></tr></thead>
          <tbody id="stu-summary-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Session detail modal -->
  <div class="modal-backdrop hidden" id="detail-modal">
    <div class="modal" style="max-width:580px">
      <div class="modal-header">
        <h3 id="detail-title">Session Detail</h3>
        <button class="modal-close" onclick="document.getElementById('detail-modal').classList.add('hidden')"><svg viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
      </div>
      <div id="detail-body"></div>
    </div>
  </div>
</main>

<div class="sidebar-overlay" id="sidebar-overlay"></div>
<script src="js/app.js"></script>
<script src="js/reports.js"></script>

<style>
.tab-btn { background:transparent;border:none;cursor:pointer;padding:.5rem 1.1rem;border-radius:7px;font-size:.875rem;font-weight:500;color:var(--text-2);transition:all .2s;font-family:var(--font-body); }
.tab-btn.active { background:var(--accent);color:#fff;box-shadow:0 2px 12px var(--accent-glow); }
</style>
</body>
</html>
